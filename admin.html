<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Daily Bread</title>

<style>
body { font-family: Georgia; background:#d2b48c; margin:0; }

header {
    background:black;
    color:#f5e6cc;
    text-align:center;
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

.tabs {
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button {
    background:black;
    color:#f5e6cc;
    padding:10px 20px;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

.tabs button.active {
    background:#a0522d;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

input, textarea, select {
    width:100%;
    margin-bottom:10px;
    padding:8px;
    box-sizing:border-box;
}

button {
    background:black;
    color:#f5e6cc;
    padding:10px 20px;
    border:none;
    cursor:pointer;
    margin-right:5px;
    margin-bottom:10px;
}

button:hover { background:#333; }

.card {
    background:#f5e6cc;
    padding:15px;
    margin-top:10px;
    border-radius:4px;
}

hr { margin:20px 0; border:1px solid #8b4513; }

label {
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>Admin Panel</h1>
</header>

<div class="container">

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('devotionals', this)">Devotionals</button>
        <button class="tab-btn" onclick="switchTab('verses', this)">Verses</button>
        <button class="tab-btn" onclick="switchTab('team', this)">Team</button>
    </div>

    <!-- ================= DEVOTIONALS ================= -->
    <div id="devotionals" class="tab-content active">
        <h2>Devotionals</h2>

        <label>Title</label>
        <input id="title">

        <label>Day</label>
        <select id="day">
            <option>Sunday</option>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
        </select>

        <label>Scripture</label>
        <input id="scripture">

        <label>Publish Date</label>
        <input id="publishDate" type="datetime-local">

        <label>Preview</label>
        <textarea id="preview"></textarea>

        <label>Content</label>
        <textarea id="content"></textarea>

        <button onclick="savePost()">Save Devotional</button>

        <hr>
        <h3>Manage Posts</h3>
        <div id="posts"></div>
    </div>

    <!-- ================= VERSES ================= -->
    <div id="verses" class="tab-content">
        <h2>Verse Scheduler (KJV)</h2>

        <label>Date</label>
        <input type="date" id="verseDate">

        <label>Reference</label>
        <input id="verseRef" placeholder="John 3:16">

        <button onclick="fetchVerse()">Fetch KJV Verse</button>

        <label>Verse Text</label>
        <textarea id="verseText" rows="6"></textarea>

        <button onclick="saveVerse()">Save Verse</button>

        <hr>
        <h3>Scheduled Verses</h3>
        <div id="verseList"></div>
    </div>

    <!-- ================= TEAM ================= -->
    <div id="team" class="tab-content">
        <h2>Team Members</h2>

        <input id="memberName" placeholder="Name">
        <textarea id="memberBio" placeholder="Bio"></textarea>

        <button onclick="saveTeamMember()">Save</button>

        <hr>
        <h3>Team List</h3>
        <div id="teamMembers"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3g--TT89iLyEQ5lvwI7mBcIygrls7iCQ",
    authDomain: "daily-bread-973e9.firebaseapp.com",
    projectId: "daily-bread-973e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

/* ================= SAFE TAB SWITCH ================= */
window.switchTab = function(tab, btn) {

    document.querySelectorAll('.tab-content')
        .forEach(t => t.classList.remove('active'));

    document.querySelectorAll('.tab-btn')
        .forEach(b => b.classList.remove('active'));

    const target = document.getElementById(tab);
    if (target) target.classList.add('active');

    if (btn) btn.classList.add('active');
};

/* ================= DEVOTIONALS ================= */
window.savePost = async function() {

    const post = {
        title: document.getElementById("title").value,
        day: document.getElementById("day").value,
        scripture: document.getElementById("scripture").value,
        preview: document.getElementById("preview").value,
        content: document.getElementById("content").value,
        publishDate: document.getElementById("publishDate").value || ""
    };

    if (editId) {
        await updateDoc(doc(db,"posts",editId), post);
        editId = null;
    } else {
        await addDoc(collection(db,"posts"), post);
    }

    loadPosts();
};

async function loadPosts() {
    const snap = await getDocs(collection(db,"posts"));
    const container = document.getElementById("posts");
    container.innerHTML = "";

    snap.forEach(d => {
        const p = d.data();

        container.innerHTML += `
        <div class="card">
            <b>${p.title || ""}</b><br>
            ${p.scripture || ""}<br>
            <button onclick="deletePost('${d.id}')">Delete</button>
        </div>`;
    });
}

window.deletePost = async function(id) {
    await deleteDoc(doc(db,"posts",id));
    loadPosts();
};

/* ================= VERSES (KJV SAFE) ================= */
window.fetchVerse = async function() {

    const ref = document.getElementById("verseRef").value;

    if (!ref) return alert("Enter a reference");

    const res = await fetch(
        "https://bible-api.com/" + encodeURIComponent(ref) + "?translation=kjv"
    );

    const data = await res.json();

    document.getElementById("verseText").value =
        data.text || "Verse not found";
};

window.saveVerse = async function() {

    await addDoc(collection(db,"dailyVerses"), {
        date: document.getElementById("verseDate").value,
        reference: document.getElementById("verseRef").value,
        verse: document.getElementById("verseText").value
    });

    loadVerses();
};

async function loadVerses() {
    const snap = await getDocs(collection(db,"dailyVerses"));
    const container = document.getElementById("verseList");
    container.innerHTML = "";

    snap.forEach(d => {
        const v = d.data();

        container.innerHTML += `
        <div class="card">
            <b>${v.date || ""}</b><br>
            ${v.reference || ""}<br>
            <small>${(v.verse || "").slice(0,120)}...</small><br>
            <button onclick="deleteVerse('${d.id}')">Delete</button>
        </div>`;
    });
}

window.deleteVerse = async function(id) {
    await deleteDoc(doc(db,"dailyVerses",id));
    loadVerses();
};

/* ================= TEAM ================= */
window.saveTeamMember = async function() {

    await addDoc(collection(db,"teamMembers"), {
        name: document.getElementById("memberName").value,
        bio: document.getElementById("memberBio").value
    });

    loadTeam();
};

async function loadTeam() {
    const snap = await getDocs(collection(db,"teamMembers"));
    const container = document.getElementById("teamMembers");
    container.innerHTML = "";

    snap.forEach(d => {
        const t = d.data();

        container.innerHTML += `
        <div class="card">
            <b>${t.name || ""}</b><br>
            ${t.bio || ""}
        </div>`;
    });
}

/* INIT */
loadPosts();
loadVerses();
loadTeam();

</script>

</body>
</html>
