<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Daily Bread Ministries</title>

<style>
body {
    font-family: Georgia;
    background: #d2b48c;
    margin: 0;
}

header {
    background: black;
    color: #f5e6cc;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

input, textarea, select {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}

button {
    background: black;
    color: #f5e6cc;
    padding: 10px;
    border: none;
    cursor: pointer;
    margin-right: 5px;
}

.card {
    background: #f5e6cc;
    padding: 15px;
    margin-top: 10px;
    border-left: 5px solid black;
}
</style>

</head>

<body>

<header>
    <h1>Admin Panel</h1>
    <p>Daily Bread Ministries</p>
</header>

<div class="container">

<h2>Add / Edit Devotional</h2>

<input id="title" placeholder="Title">

<select id="day">
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
</select>

<input id="scripture" placeholder="Scripture">
<input id="image" placeholder="Image path (ex: images/test.jpg)">
<input id="publishDate" type="datetime-local">

<textarea id="preview" placeholder="Preview text"></textarea>
<textarea id="content" placeholder="Full devotional"></textarea>

<button onclick="savePost()">Save</button>

<hr>

<h2>Manage Posts</h2>
<div id="posts"></div>

</div>

<script>

let editId = null;

// SAVE / UPDATE
function savePost() {

const post = {
id: editId || Date.now(),
title: document.getElementById("title").value,
day: document.getElementById("day").value,
scripture: document.getElementById("scripture").value,
preview: document.getElementById("preview").value,
content: document.getElementById("content").value,
image: document.getElementById("image").value,
publishDate: document.getElementById("publishDate").value
};

let posts = JSON.parse(localStorage.getItem("devotionals")) || [];

if (editId) {
posts = posts.map(p => p.id === editId ? post : p);
editId = null;
} else {
posts.push(post);
}

localStorage.setItem("devotionals", JSON.stringify(posts));

clearForm();
displayPosts();
}

// DISPLAY POSTS
function displayPosts() {

const container = document.getElementById("posts");
container.innerHTML = "";

let posts = JSON.parse(localStorage.getItem("devotionals")) || [];

posts.sort((a,b) => new Date(b.publishDate || b.date) - new Date(a.publishDate || a.date));

posts.forEach(post => {

container.innerHTML += `
<div class="card">
<h3>${post.title}</h3>
<p><strong>${post.day}</strong> | ${post.scripture}</p>
<p><small>Publishes: ${post.publishDate || "Immediately"}</small></p>

<button onclick="editPost(${post.id})">Edit</button>
<button onclick="deletePost(${post.id})">Delete</button>
</div>
`;
});
}

// EDIT
function editPost(id) {

const posts = JSON.parse(localStorage.getItem("devotionals")) || [];
const post = posts.find(p => p.id === id);

editId = id;

document.getElementById("title").value = post.title;
document.getElementById("day").value = post.day;
document.getElementById("scripture").value = post.scripture;
document.getElementById("preview").value = post.preview;
document.getElementById("content").value = post.content;
document.getElementById("image").value = post.image;
document.getElementById("publishDate").value = post.publishDate;
}

// DELETE
function deletePost(id) {

let posts = JSON.parse(localStorage.getItem("devotionals")) || [];

posts = posts.filter(p => p.id !== id);

localStorage.setItem("devotionals", JSON.stringify(posts));

displayPosts();
}

// CLEAR FORM
function clearForm() {
document.getElementById("title").value = "";
document.getElementById("scripture").value = "";
document.getElementById("preview").value = "";
document.getElementById("content").value = "";
document.getElementById("image").value = "";
document.getElementById("publishDate").value = "";
editId = null;
}

// LOAD
displayPosts();

</script>

</body>
</html>
