<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Bread Ministries</title>

<style>
body { font-family: Georgia; background:#d2b48c; margin:0; }

header {
    background:black;
    color:#f5e6cc;
    text-align:center;
    padding:25px;
}

.logo { width:300px; display:block; margin:0 auto 10px; }

.section { max-width:900px; margin:auto; padding:20px; }

.card {
    background:#f5e6cc;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
}

.card img {
    width:60%;
    display:block;
    margin:0 auto 10px;
}

button {
    background:black;
    color:#f5e6cc;
    padding:8px;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="DailyBreadLogo.png" class="logo">
<h1>Daily Bread Ministries</h1>
<p>Feeding on the Word daily</p>
</header>

<div class="section">
<h2>Devotionals</h2>
<div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3g--TT89iLyEQ5lvwI7mBcIygrls7iCQ",
  authDomain: "daily-bread-973e9.firebaseapp.com",
  projectId: "daily-bread-973e9",
  storageBucket: "daily-bread-973e9.firebasestorage.app",
  messagingSenderId: "277061281496",
  appId: "1:277061281496:web:1a72a48469e863e5dcd9ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dayImages = {
Sunday:"images/sunday.jpg",
Monday:"images/monday.jpg",
Tuesday:"images/tuesday.jpg",
Wednesday:"images/wednesday.jpg",
Thursday:"images/thursday.jpg",
Friday:"images/friday.jpg",
Saturday:"images/saturday.jpg"
};

async function loadPosts() {
const container = document.getElementById("posts");
container.innerHTML = "";

const snapshot = await getDocs(collection(db, "posts"));
const now = new Date();

let posts = [];

snapshot.forEach(doc => {
const p = doc.data();
if (!p.publishDate || new Date(p.publishDate) <= now) {
posts.push({ ...p, id: doc.id });
}
});

posts.sort((a,b)=> new Date(b.publishDate || 0) - new Date(a.publishDate || 0));

posts.forEach(post => {

const img = post.image && post.image.trim() !== "" 
? post.image 
: dayImages[post.day];

container.innerHTML += `
<div class="card">
<img src="${img}">
<h3>${post.day} – ${post.title}</h3>
<p><strong>${post.scripture}</strong></p>
<p>${post.preview}</p>
<button onclick="showFull('${post.id}')">Read Full</button>
</div>
`;
});
}

window.showFull = async function(id) {

const snapshot = await getDocs(collection(db, "posts"));
let post;

snapshot.forEach(doc => {
if (doc.id === id) post = doc.data();
});

document.getElementById("posts").innerHTML = `
<div class="card">
<h2>${post.day} – ${post.title}</h2>
<p><strong>${post.scripture}</strong></p>
<p>${post.content}</p>
<button onclick="location.reload()">← Back</button>
</div>
`;
}

loadPosts();

</script>

</body>
</html>
