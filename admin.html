<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Daily Bread</title>

<style>
body { font-family: Georgia; background:#d2b48c; margin:0; }

header {
    background:black;
    color:#f5e6cc;
    text-align:center;
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, textarea, select {
    width:100%;
    margin-bottom:10px;
    padding:8px;
}

button {
    background:black;
    color:#f5e6cc;
    padding:10px;
    border:none;
    cursor:pointer;
    margin-right:5px;
}

.card {
    background:#f5e6cc;
    padding:15px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Admin Panel</h1>
</header>

<div class="container">

<h2>Add / Edit Devotional</h2>

<input id="title" placeholder="Title">

<select id="day">
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
</select>

<input id="scripture" placeholder="Scripture">
<input id="image" placeholder="Image path">
<input id="publishDate" type="datetime-local">

<textarea id="preview" placeholder="Preview"></textarea>
<textarea id="content" placeholder="Full devotional"></textarea>

<button onclick="savePost()">Save</button>

<hr>

<h2>Manage Posts</h2>
<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3g--TT89iLyEQ5lvwI7mBcIygrls7iCQ",
  authDomain: "daily-bread-973e9.firebaseapp.com",
  projectId: "daily-bread-973e9",
  storageBucket: "daily-bread-973e9.firebasestorage.app",
  messagingSenderId: "277061281496",
  appId: "1:277061281496:web:1a72a48469e863e5dcd9ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

window.savePost = async function() {

const post = {
title: title.value,
day: day.value,
scripture: scripture.value,
preview: preview.value,
content: content.value,
image: image.value,
publishDate: publishDate.value
};

if (editId) {
await updateDoc(doc(db, "posts", editId), post);
editId = null;
} else {
await addDoc(collection(db, "posts"), post);
}

clearForm();
displayPosts();
}

async function displayPosts() {

const container = document.getElementById("posts");
container.innerHTML = "";

const snapshot = await getDocs(collection(db, "posts"));

snapshot.forEach(docSnap => {
const p = docSnap.data();

container.innerHTML += `
<div class="card">
<h3>${p.title}</h3>
<p>${p.day} | ${p.scripture}</p>

<button onclick="editPost('${docSnap.id}')">Edit</button>
<button onclick="deletePost('${docSnap.id}')">Delete</button>
</div>
`;
});
}

window.editPost = async function(id) {

const snapshot = await getDocs(collection(db, "posts"));

snapshot.forEach(docSnap => {
if (docSnap.id === id) {
const p = docSnap.data();

editId = id;

title.value = p.title;
day.value = p.day;
scripture.value = p.scripture;
preview.value = p.preview;
content.value = p.content;
image.value = p.image;
publishDate.value = p.publishDate;
}
});
}

window.deletePost = async function(id) {
await deleteDoc(doc(db, "posts", id));
displayPosts();
}

function clearForm() {
title.value="";
scripture.value="";
preview.value="";
content.value="";
image.value="";
publishDate.value="";
editId=null;
}

displayPosts();

</script>

</body>
</html>
