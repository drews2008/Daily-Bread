<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devotional Archive - Daily Bread</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Georgia, serif;
    background: linear-gradient(180deg, #d2b48c, #c9a77d);
    margin: 0;
    padding: 0;
    color: #222;
}

/* HEADER */
header {
    background: #000;
    color: #f5e6cc;
    text-align: center;
    padding: 30px 20px;
    border-bottom: 4px solid #8b5e3c;
}

header h1 {
    margin: 0;
    font-size: 2.4em;
}

header p {
    margin: 6px 0 0;
    opacity: 0.9;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: 25px auto;
    padding: 0 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.stat-box {
    background: #f5e6cc;
    padding: 15px 20px;
    border-radius: 10px;
    min-width: 140px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.stat-number {
    font-size: 1.8em;
    font-weight: bold;
    color: #8b4513;
}

/* TOOLBAR */
.toolbar {
    background: #f5e6cc;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

input, select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-family: inherit;
    min-width: 180px;
}

/* BUTTONS */
button {
    background: #000;
    color: #f5e6cc;
    padding: 10px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

/* ARCHIVE HEADER */
.month-header {
    grid-column: 1 / -1;
    margin-top: 25px;
    font-size: 1.3em;
    font-weight: bold;
    color: #3a2a1a;
    border-bottom: 2px solid #8b5e3c;
    padding-bottom: 5px;
}

/* GRID */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 18px;
}

/* CARD */
.day-card {
    background: #f5e6cc;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    transition: 0.2s ease;
    display: flex;
    flex-direction: column;
}

.day-card:hover {
    transform: translateY(-5px);
}

.day-header {
    background: #000;
    color: #f5e6cc;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

.day-content {
    padding: 15px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.scripture {
    font-style: italic;
    color: #7a4a1f;
    margin-bottom: 10px;
}

.preview-text {
    font-size: 0.9em;
    color: #555;
    flex-grow: 1;
}

/* EMPTY */
.empty {
    text-align: center;
    padding: 50px;
    background: #f5e6cc;
    border-radius: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: #f5e6cc;
    margin: 5% auto;
    padding: 25px;
    max-width: 650px;
    border-radius: 10px;
    max-height: 80vh;
    overflow-y: auto;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
    .toolbar {
        flex-direction: column;
        align-items: stretch;
    }

    input, select, button {
        width: 100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>Daily Bread Archive</h1>
    <p>Search & Study Past Devotionals</p>
</header>

<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div>Total</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="publishedCount">0</div>
            <div>Published</div>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search title, scripture, or content...">
        
        <select id="dayFilter">
            <option value="">All Days</option>
            <option>Sunday</option><option>Monday</option>
            <option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option>
            <option>Saturday</option>
        </select>

        <button onclick="resetView()">Reset</button>
        <button onclick="toggleArchive()">Toggle View</button>
        <button onclick="goHome()">Home</button>
    </div>

    <!-- ARCHIVE -->
    <div id="calendarContainer" class="calendar-grid"></div>

</div>

<!-- MODAL -->
<div id="devotionalModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="devotionalContent"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3g--TT89iLyEQ5lvwI7mBcIygrls7iCQ",
  authDomain: "daily-bread-973e9.firebaseapp.com",
  projectId: "daily-bread-973e9",
  storageBucket: "daily-bread-973e9.firebasestorage.app",
  messagingSenderId: "277061281496",
  appId: "1:277061281496:web:1a72a48469e863e5dcd9ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];
let archiveMode = true;

async function loadPosts() {
    const snap = await getDocs(collection(db, "posts"));
    allPosts = [];

    snap.forEach(doc => {
        allPosts.push({ ...doc.data(), id: doc.id });
    });

    allPosts.sort((a,b) => new Date(b.publishDate||0) - new Date(a.publishDate||0));

    updateStats();
    render(allPosts);
}

/* =========================
   SEARCH + FILTER
========================= */
function getFiltered() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const day = document.getElementById("dayFilter").value;

    return allPosts.filter(p => {

        const textMatch =
            (p.title || "").toLowerCase().includes(search) ||
            (p.scripture || "").toLowerCase().includes(search) ||
            (p.content || "").toLowerCase().includes(search);

        const dayMatch = !day || p.day === day;

        return textMatch && dayMatch;
    });
}

/* =========================
   ARCHIVE RENDER
========================= */
function render(posts) {
    const container = document.getElementById("calendarContainer");

    if (!posts.length) {
        container.innerHTML = `<div class="empty">No devotionals found.</div>`;
        return;
    }

    const grouped = {};

    posts.forEach(p => {
        const d = p.publishDate ? new Date(p.publishDate) : null;
        const key = d ? d.toLocaleString('default', { month:'long', year:'numeric' }) : "Unpublished";

        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(p);
    });

    container.innerHTML = Object.keys(grouped).map(month => {

        return `
            <div class="month-header">${month}</div>
            ${grouped[month].map(post => `
                <div class="day-card">
                    <div class="day-header">${post.day}</div>
                    <div class="day-content">
                        <h3>${post.title}</h3>
                        <div class="scripture">${post.scripture}</div>
                        <div class="preview-text">${post.preview || ""}</div>
                        <button onclick="openPost('${post.id}')">Read</button>
                    </div>
                </div>
            `).join("")}
        `;
    }).join("");
}

/* =========================
   MODAL
========================= */
window.openPost = function(id) {
    const post = allPosts.find(p => p.id === id);
    if (!post) return;

    document.getElementById("devotionalContent").innerHTML = `
        <h2>${post.title}</h2>
        <p><strong>${post.scripture}</strong></p>
        <hr>
        <div>${post.content}</div>
    `;

    document.getElementById("devotionalModal").style.display = "block";
};

window.closeModal = () => {
    document.getElementById("devotionalModal").style.display = "none";
};

/* =========================
   CONTROLS
========================= */
document.getElementById("searchInput").addEventListener("input", () => {
    render(getFiltered());
});

document.getElementById("dayFilter").addEventListener("change", () => {
    render(getFiltered());
});

window.resetView = function() {
    document.getElementById("searchInput").value = "";
    document.getElementById("dayFilter").value = "";
    render(allPosts);
};

window.toggleArchive = function() {
    archiveMode = !archiveMode;
    render(archiveMode ? allPosts : allPosts.slice(0,10));
};

window.goHome = function() {
    window.location.href = "index.html";
};

/* =========================
   STATS
========================= */
function updateStats() {
    const published = allPosts.filter(p => p.publishDate).length;

    document.getElementById("totalCount").textContent = allPosts.length;
    document.getElementById("publishedCount").textContent = published;
}

/* INIT */
loadPosts();

</script>

</body>
</html>
