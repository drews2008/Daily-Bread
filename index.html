<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Bread Ministries</title>

<style>
body { font-family: Georgia; background:#d2b48c; margin:0; }

header {
    background:black;
    color:#f5e6cc;
    text-align:center;
    padding:25px;
}

.logo {
    width:80px;
    display:block;
    margin:0 auto 10px;
}

nav {
    background:#222;
    text-align:center;
    padding:10px;
}

nav a {
    color:#f5e6cc;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

.section {
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card {
    background:#f5e6cc;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
}

.card img {
    width:60%;
    display:block;
    margin:0 auto 10px;
}

/* DAY THEMES */
.sunday { border-left:5px solid black; }
.monday { border-left:5px solid #d97706; }
.tuesday { border-left:5px solid #7f1d1d; }
.wednesday { border-left:5px solid #374151; }
.thursday { border-left:5px solid #111827; }
.friday { border-left:5px solid #065f46; }
.saturday { border-left:5px solid #78350f; }

button {
    background:black;
    color:#f5e6cc;
    padding:8px;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="DailyBreadLogo.png" class="logo">
<h1>Daily Bread Ministries</h1>
<p>Feeding on the Word daily</p>
</header>

<nav>
<a href="index.html">Home</a>
</nav>

<div class="section">

<h2>Filter</h2>
<button onclick="filterPosts('All')">All</button>
<button onclick="filterPosts('Sunday')">Sunday</button>
<button onclick="filterPosts('Monday')">Monday</button>
<button onclick="filterPosts('Tuesday')">Tuesday</button>
<button onclick="filterPosts('Wednesday')">Wednesday</button>
<button onclick="filterPosts('Thursday')">Thursday</button>
<button onclick="filterPosts('Friday')">Friday</button>
<button onclick="filterPosts('Saturday')">Saturday</button>

<h2>Devotionals</h2>
<div id="posts"></div>

</div>

<script>

// DEFAULT DAY IMAGES
const dayImages = {
Sunday:"images/sunday.jpg",
Monday:"images/monday.jpg",
Tuesday:"images/tuesday.jpg",
Wednesday:"images/wednesday.jpg",
Thursday:"images/thursday.jpg",
Friday:"images/friday.jpg",
Saturday:"images/saturday.jpg"
};

// GET POSTS FROM STORAGE
function getPosts() {
    const posts = JSON.parse(localStorage.getItem("devotionals")) || [];
    const now = new Date();

    return posts.filter(post => {
        if (!post.publishDate || post.publishDate === "") return true;
        return new Date(post.publishDate) <= now;
    });
}

// DISPLAY POSTS
function displayPosts(posts) {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    if (posts.length === 0) {
        container.innerHTML = "<p>No devotionals yet.</p>";
        return;
    }

    posts.sort((a,b) => new Date(b.publishDate || 0) - new Date(a.publishDate || 0));

    posts.forEach(post => {

        const img = (post.image && post.image.trim() !== "")
            ? post.image
            : dayImages[post.day] || "";

        container.innerHTML += `
        <div class="card ${post.day.toLowerCase()}">
            ${img ? `<img src="${img}">` : ""}
            <h3>${post.day} – ${post.title}</h3>
            <p><strong>${post.scripture}</strong></p>
            <p>${post.preview}</p>
            <button onclick="showFull(${post.id})">Read Full</button>
        </div>
        `;
    });
}

// SHOW FULL POST
function showFull(id) {
    const posts = getPosts();
    const post = posts.find(p => p.id === id);

    const img = (post.image && post.image.trim() !== "")
        ? post.image
        : dayImages[post.day] || "";

    document.getElementById("posts").innerHTML = `
    <div class="card ${post.day.toLowerCase()}">
        ${img ? `<img src="${img}">` : ""}
        <h2>${post.day} – ${post.title}</h2>
        <p><strong>${post.scripture}</strong></p>
        <p>${post.content}</p>
        <button onclick="loadHome()">← Back</button>
    </div>
    `;
}

// FILTER POSTS
function filterPosts(day) {
    if (day === "All") {
        displayPosts(getPosts());
    } else {
        displayPosts(getPosts().filter(p => p.day === day));
    }
}

// LOAD HOME
function loadHome() {
    displayPosts(getPosts());
}

// INITIAL LOAD
loadHome();

</script>

</body>
</html>
