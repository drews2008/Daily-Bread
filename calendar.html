<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devotionals Calendar - Daily Bread</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Georgia, serif;
    background: linear-gradient(180deg, #d2b48c, #c9a77d);
    margin: 0;
    padding: 0;
    color: #222;
}

/* HEADER */
header {
    background: #000;
    color: #f5e6cc;
    text-align: center;
    padding: 30px 20px;
    border-bottom: 4px solid #8b5e3c;
}

header h1 {
    margin: 0;
    font-size: 2.6em;
    letter-spacing: 1px;
}

header p {
    margin: 6px 0 0;
    font-size: 1.1em;
    opacity: 0.9;
}

.logo {
    width: 170px;
    margin-bottom: 10px;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: 25px auto;
    padding: 0 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.stat-box {
    background: #f5e6cc;
    padding: 18px 28px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    min-width: 140px;
}

.stat-number {
    font-size: 2em;
    font-weight: bold;
    color: #8b4513;
}

.stat-label {
    color: #444;
    font-size: 0.9em;
}

/* FILTER BAR */
.filter-section {
    background: #f5e6cc;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.filter-section label {
    font-weight: bold;
    color: #333;
}

.filter-section select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTONS */
button {
    background: #000;
    color: #f5e6cc;
    padding: 9px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 0.95em;
}

button:hover {
    background: #333;
    transform: translateY(-1px);
}

/* GRID */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 18px;
}

/* CARD */
.day-card {
    background: #f5e6cc;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    transition: 0.25s ease;
    display: flex;
    flex-direction: column;
}

.day-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
}

.day-header {
    background: #000;
    color: #f5e6cc;
    padding: 12px;
    text-align: center;
    font-weight: bold;
    letter-spacing: 0.5px;
}

.day-content {
    padding: 15px;
    display: flex;
    flex-direction: column;
    flex: 1;
}

.day-content h3 {
    margin: 0 0 8px;
    font-size: 1.1em;
    color: #222;
}

.scripture {
    font-style: italic;
    color: #7a4a1f;
    margin-bottom: 10px;
}

.preview-text {
    font-size: 0.92em;
    color: #555;
    line-height: 1.4;
    flex-grow: 1;
}

.day-content button {
    margin-top: 12px;
    align-self: flex-start;
}

/* EMPTY STATE */
.no-devotionals {
    text-align: center;
    padding: 50px;
    background: #f5e6cc;
    border-radius: 10px;
    color: #666;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
}

.modal-content {
    background: #f5e6cc;
    margin: 5% auto;
    padding: 25px;
    border-radius: 10px;
    max-width: 650px;
    max-height: 80vh;
    overflow-y: auto;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
    header h1 { font-size: 1.9em; }

    .stats {
        flex-direction: column;
        align-items: center;
    }

    .filter-section {
        flex-direction: column;
        align-items: stretch;
    }

    button, select {
        width: 100%;
    }
}
</style>
</head>

<body>

<header>
    <img src="DailyBreadLogo.png" class="logo" alt="Daily Bread Logo">
    <h1>Daily Bread Ministries</h1>
    <p>Devotionals Calendar</p>
</header>

<div class="container">

    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total Devotionals</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="weekCount">0</div>
            <div class="stat-label">This Week</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="publishedCount">0</div>
            <div class="stat-label">Published</div>
        </div>
    </div>

    <div class="filter-section">
        <label for="dayFilter">Filter:</label>
        <select id="dayFilter">
            <option value="">All Days</option>
            <option>Sunday</option>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
        </select>

        <button onclick="sortByDate()">Sort</button>
        <button onclick="resetView()">Reset</button>
        <button onclick="goHome()">Home</button>
    </div>

    <div id="calendarContainer" class="calendar-grid"></div>

</div>

<!-- MODAL -->
<div id="devotionalModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="devotionalContent"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3g--TT89iLyEQ5lvwI7mBcIygrls7iCQ",
  authDomain: "daily-bread-973e9.firebaseapp.com",
  projectId: "daily-bread-973e9",
  storageBucket: "daily-bread-973e9.firebasestorage.app",
  messagingSenderId: "277061281496",
  appId: "1:277061281496:web:1a72a48469e863e5dcd9ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

async function loadAllDevotionals() {
    const container = document.getElementById("calendarContainer");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "posts"));
    const now = new Date();

    allPosts = [];

    snapshot.forEach(doc => {
        const p = doc.data();
        if (!p.publishDate || new Date(p.publishDate) <= now) {
            allPosts.push({ ...p, id: doc.id });
        }
    });

    allPosts.sort((a, b) => new Date(b.publishDate || 0) - new Date(a.publishDate || 0));

    updateStats();
    renderCalendar(allPosts);
}

function renderCalendar(posts) {
    const container = document.getElementById("calendarContainer");

    if (!posts.length) {
        container.innerHTML = `<div class="no-devotionals">No devotionals found.</div>`;
        return;
    }

    container.innerHTML = posts.map(post => {
        const publishDate = post.publishDate
            ? new Date(post.publishDate).toLocaleDateString()
            : "Not published";

        return `
        <div class="day-card">
            <div class="day-header">${post.day} - ${publishDate}</div>
            <div class="day-content">
                <h3>${post.title}</h3>
                <p class="scripture"><strong>${post.scripture}</strong></p>
                <p class="preview-text">${post.preview}</p>
                <button onclick="showFullDevotional('${post.id}')">Read Full</button>
            </div>
        </div>`;
    }).join("");
}

window.showFullDevotional = function(id) {
    const post = allPosts.find(p => p.id === id);
    if (!post) return;

    document.getElementById("devotionalContent").innerHTML = `
        <h2>${post.day} – ${post.title}</h2>
        <p><strong>Scripture:</strong> ${post.scripture}</p>
        <p style="font-size:0.9em;color:#666;">
            ${post.publishDate ? "Published: " + new Date(post.publishDate).toLocaleDateString() : ""}
        </p>
        <hr>
        <div style="line-height:1.7;color:#444;">
            ${post.content}
        </div>
    `;

    document.getElementById("devotionalModal").style.display = "block";
};

window.closeModal = () => {
    document.getElementById("devotionalModal").style.display = "none";
};

document.getElementById("devotionalModal").onclick = (e) => {
    if (e.target.id === "devotionalModal") closeModal();
};

document.getElementById("dayFilter").addEventListener("change", function() {
    const val = this.value;
    renderCalendar(val ? allPosts.filter(p => p.day === val) : allPosts);
});

window.sortByDate = function() {
    renderCalendar([...allPosts].sort((a, b) =>
        new Date(b.publishDate || 0) - new Date(a.publishDate || 0)
    ));
};

window.resetView = function() {
    document.getElementById("dayFilter").value = "";
    renderCalendar(allPosts);
};

window.goHome = function() {
    window.location.href = "index.html";
};

function updateStats() {
    const now = new Date();

    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    weekStart.setHours(0,0,0,0);

    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 7);

    const published = allPosts.filter(p =>
        p.publishDate && new Date(p.publishDate) <= now
    ).length;

    const week = allPosts.filter(p => {
        const d = new Date(p.publishDate || 0);
        return d >= weekStart && d <= weekEnd;
    }).length;

    document.getElementById("totalCount").textContent = allPosts.length;
    document.getElementById("weekCount").textContent = week;
    document.getElementById("publishedCount").textContent = published;
}

loadAllDevotionals();

</script>

</body>
</html>
